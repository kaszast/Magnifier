<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="512" height="512">
    <defs>
        <!-- Deep premium gradient background from dark purple-indigo to dark plum -->
        <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A103C" />
            <stop offset="50%" stop-color="#24144A" />
            <stop offset="100%" stop-color="#45123E" />
        </linearGradient>

        <!-- Subtle ambient glow in center -->
        <radialGradient id="glow_grad" cx="54" cy="54" r="30" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D0BCFF" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#D0BCFF" stop-opacity="0" />
        </radialGradient>

        <!-- Magnifier Handle with vibrant dark gradient finish -->
        <linearGradient id="handle_grad" x1="60" y1="60" x2="80" y2="80" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D0BCFF" />
            <stop offset="50%" stop-color="#6650a4" />
            <stop offset="100%" stop-color="#45123E" />
        </linearGradient>

        <!-- Iridescent Outer Rim / Bezel of the Lens -->
        <linearGradient id="bezel_grad" x1="27" y1="27" x2="65" y2="65" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="30%" stop-color="#D0BCFF" />
            <stop offset="70%" stop-color="#EFB8C8" />
            <stop offset="100%" stop-color="#6650a4" />
        </linearGradient>

        <!-- Glass Lens Fill (Translucent cyan/purple tint) -->
        <linearGradient id="glass_grad" x1="29" y1="29" x2="63" y2="63" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D0BCFF" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.08" />
        </linearGradient>
    </defs>

    <!-- 1. Background -->
    <rect width="108" height="108" fill="url(#bg_grad)" rx="16" />

    <!-- 2. Subtle overlay grid/pattern for modern tech texture -->
    <path d="M18,0 L18,108 M36,0 L36,108 M54,0 L54,108 M72,0 L72,108 M90,0 L90,108 M0,18 L108,18 M0,36 L108,36 M0,54 L108,54 M0,72 L108,72 M0,90 L108,90" 
          fill="none" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="0.6" />

    <!-- 3. Ambient Glow -->
    <circle cx="54" cy="54" r="30" fill="url(#glow_grad)" />

    <!-- 4. Ambient Drop Shadows for depth -->
    <circle cx="48" cy="29" r="19" fill="none" stroke="#000000" stroke-opacity="0.31" stroke-width="6" />
    <line x1="62" y1="62" x2="82" y2="82" stroke="#000000" stroke-opacity="0.31" stroke-width="9" stroke-linecap="round" />

    <!-- 5. Magnifier Handle -->
    <line x1="60" y1="60" x2="80" y2="80" stroke="url(#handle_grad)" stroke-width="8" stroke-linecap="round" />

    <!-- 6. Metallic Connector Ring -->
    <line x1="58" y1="58" x2="62" y2="62" stroke="#EFB8C8" stroke-width="9" stroke-linecap="square" />

    <!-- 7. Iridescent Outer Rim Bezel -->
    <circle cx="46" cy="27" r="19" fill="none" stroke="url(#bezel_grad)" stroke-width="5" />

    <!-- 8. Glass Lens Fill -->
    <circle cx="46" cy="29" r="17" fill="url(#glass_grad)" />

    <!-- 9. Lens Light Reflection (Top-left crescent) -->
    <path d="M 32.5,38.5 A 13.5,13.5 0 0,1 38.5,32.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round" />

    <!-- 10. Lens Light Reflection (Bottom-right soft gleam) -->
    <path d="M 59.5,53.5 A 13.5,13.5 0 0,1 53.5,59.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round" />
</svg>
