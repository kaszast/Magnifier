<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg_grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0F0926" />
            <stop offset="100%" stop-color="#1B1A21" />
        </linearGradient>
        
        <linearGradient id="primary_grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D0BCFF" />
            <stop offset="100%" stop-color="#EFB8C8" />
        </linearGradient>

        <linearGradient id="tab_selected_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2D2146" />
            <stop offset="100%" stop-color="#1F1332" />
        </linearGradient>

        <!-- Fonts -->
        <style>
            .app-title { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 800; font-size: 38px; fill: #FFFFFF; letter-spacing: 2px; }
            .heading { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 26px; fill: #FFFFFF; }
            .body-text { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; font-size: 20px; fill: #E6E1E5; }
            .caption { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 400; font-size: 16px; fill: #938F99; }
            .button-text { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #FFFFFF; }
            .label-selected { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 14px; fill: #D0BCFF; letter-spacing: 1px; }
            .label-unselected { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; font-size: 14px; fill: #938F99; letter-spacing: 1px; }
            .hud-badge { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #D0BCFF; }
        </style>
    </defs>

    <!-- Background Frame -->
    <rect width="1080" height="1920" fill="url(#bg_grad)" />

    <!-- Outer Phone Mockup Bezel (Premium dark outline) -->
    <rect x="20" y="20" width="1040" height="1880" rx="60" fill="none" stroke="#25212E" stroke-width="12" />
    <!-- Screen Notch/Camera Cutout -->
    <rect x="420" y="45" width="240" height="40" rx="20" fill="#25212E" />

    <!-- 1. HEADER BAR -->
    <g transform="translate(60, 110)">
        <text x="0" y="40" class="app-title">NAGYÍTÓ <tspan fill="#D0BCFF">PRO</tspan></text>
        <text x="0" y="80" class="caption">1. KÉPERNYŐKÉP: Szuper-tiszta digitális zoom</text>
        
        <!-- Status Bar Mockup -->
        <g transform="translate(800, 20)" fill="#FFFFFF" fill-opacity="0.7">
            <!-- Signal -->
            <rect x="0" y="8" width="5" height="12" rx="1" />
            <rect x="8" y="4" width="5" height="16" rx="1" />
            <rect x="16" y="0" width="5" height="20" rx="1" />
            <!-- Wifi -->
            <path d="M 32,5 A 12,12 0 0,1 52,5 M 36,9 A 7,7 0 0,1 48,9 M 40,14 A 2,2 0 0,1 44,14" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.5" />
            <!-- Battery -->
            <rect x="64" y="2" width="30" height="16" rx="3" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2" />
            <rect x="67" y="5" width="20" height="10" rx="1" />
            <rect x="95" y="7" width="3" height="6" rx="1" />
        </g>
    </g>

    <!-- 2. MAIN VIEWFINDER (Live Magnifier Camera Preview Area) -->
    <g transform="translate(60, 240)">
        <!-- Viewfinder Background -->
        <rect width="960" height="1050" rx="40" fill="#090514" stroke="#D0BCFF" stroke-opacity="0.3" stroke-width="3" />
        <clipPath id="viewfinder_clip">
            <rect width="960" height="1050" rx="40" />
        </clipPath>

        <!-- Simulated live magnified text inside viewfinder -->
        <g clip-path="url(#viewfinder_clip)">
            <!-- Grid Lines of the document in background -->
            <rect width="960" height="1050" fill="#13101E" />
            <path d="M0,150 L960,150 M0,300 L960,300 M0,450 L960,450 M0,600 L960,600 M0,750 L960,750 M0,900 L960,900" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1.5" />

            <!-- Original unzoomed background text (blurred, small) -->
            <g opacity="0.15">
                <text x="50" y="100" font-family="'Inter', sans-serif" font-size="16" fill="#FFFFFF">ACTIVE SUBSTANCE: Each film-coated tablet contains 500 mg of paracetamol.</text>
                <text x="50" y="140" font-family="'Inter', sans-serif" font-size="16" fill="#FFFFFF">INDICATIONS: For the temporary relief of mild to moderate pain including headache.</text>
                <text x="50" y="180" font-family="'Inter', sans-serif" font-size="16" fill="#FFFFFF">DOSAGE: Adults and children over 12 years: 1-2 tablets every 4 to 6 hours as required.</text>
            </g>

            <!-- MAGNIFIED CIRCULAR LENS AREA (Simulated 3.5x digital zoom) -->
            <circle cx="480" cy="525" r="380" fill="#1A152E" stroke="#D0BCFF" stroke-width="6" />
            <circle cx="480" cy="525" r="378" fill="none" stroke="#EFB8C8" stroke-width="2" />

            <g transform="translate(480, 525) scale(2.8)" fill="#FFFFFF">
                <!-- High quality magnified text -->
                <text x="0" y="-40" font-family="'Inter', sans-serif" font-weight="800" font-size="20" fill="#EFB8C8" text-anchor="middle">GYÓGYSZERÉSZET</text>
                <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="15" fill="#FFFFFF" text-anchor="middle">Hatóanyag: 500mg Paracetamol</text>
                <text x="0" y="30" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#D0BCFF" text-anchor="middle">Szedés: Felnőtteknek napi 1-2 tabletta</text>
                <text x="0" y="55" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#938F99" text-anchor="middle">Gyermekek elől gondosan elzárandó!</text>
            </g>

            <!-- Decorative HUD overlay crosshair in zoomed area -->
            <circle cx="480" cy="525" r="120" fill="none" stroke="#EFB8C8" stroke-opacity="0.3" stroke-dasharray="8 8" stroke-width="2" />
            <line x1="480" y1="145" x2="480" y2="200" stroke="#D0BCFF" stroke-opacity="0.5" stroke-width="3" />
            <line x1="480" y1="850" x2="480" y2="905" stroke="#D0BCFF" stroke-opacity="0.5" stroke-width="3" />
            <line x1="100" y1="525" x2="160" y2="525" stroke="#D0BCFF" stroke-opacity="0.5" stroke-width="3" />
            <line x1="800" y1="525" x2="860" y2="525" stroke="#D0BCFF" stroke-opacity="0.5" stroke-width="3" />

            <!-- Zoom factor HUD badge inside view -->
            <rect x="40" y="40" width="150" height="50" rx="25" fill="#0F0926" fill-opacity="0.8" stroke="#D0BCFF" stroke-opacity="0.4" stroke-width="2" />
            <text x="115" y="72" class="hud-badge" text-anchor="middle">3.5x ZOOM</text>

            <!-- Light focus box -->
            <rect x="360" y="405" width="240" height="240" rx="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="10 6" />
        </g>
    </g>

    <!-- 3. CAMERA QUICK ACTIONS OVERLAY (Flash, Freeze, Save, Share) -->
    <g transform="translate(60, 1315)">
        <!-- Flashlight (Off) -->
        <g transform="translate(140, 0)">
            <circle cx="40" cy="40" r="40" fill="#25212E" stroke="#D0BCFF" stroke-opacity="0.2" stroke-width="2" />
            <!-- Flash Icon -->
            <path d="M40,20 L27,43 L38,43 L35,60 L51,35 L40,35 Z" fill="#938F99" />
        </g>

        <!-- Freeze Frame Button (Center Large) -->
        <g transform="translate(390, -15)">
            <circle cx="55" cy="55" r="55" fill="url(#primary_grad)" />
            <!-- Pause Icon (Ready to freeze) -->
            <rect x="42" y="35" width="10" height="40" rx="3" fill="#1B1A21" />
            <rect x="58" y="35" width="10" height="40" rx="3" fill="#1B1A21" />
        </g>

        <!-- Save Button -->
        <g transform="translate(660, 0)">
            <circle cx="40" cy="40" r="40" fill="#25212E" stroke="#D0BCFF" stroke-opacity="0.2" stroke-width="2" />
            <!-- Download Icon -->
            <path d="M40,25 L40,48 M32,40 L40,48 L48,40 M28,55 L52,55" fill="none" stroke="#D0BCFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>

    <!-- 4. CONTROLS CONTAINER (Slidables according to active tab) -->
    <g transform="translate(60, 1450)">
        <rect width="960" height="250" rx="32" fill="#14111E" stroke="#D0BCFF" stroke-opacity="0.15" stroke-width="2" />

        <!-- 0: ZOOM TAB CONTROLS (Unified Single Slider) -->
        <g transform="translate(50, 40)">
            <!-- Slider Header -->
            <text x="0" y="30" class="heading" font-size="22">Nagyítás mértéke (Digital Zoom)</text>
            <text x="860" y="30" class="heading" font-size="22" fill="#D0BCFF">3.5x</text>

            <!-- Slider Track -->
            <g transform="translate(0, 70)">
                <rect width="860" height="12" rx="6" fill="#25212E" />
                <rect width="516" height="12" rx="6" fill="url(#primary_grad)" />
                <!-- Slider Thumb -->
                <circle cx="516" cy="6" r="22" fill="#FFFFFF" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.4))" />
                <circle cx="516" cy="6" r="10" fill="#D0BCFF" />
            </g>

            <!-- Scale Ticks -->
            <g transform="translate(0, 130)" fill="#938F99" font-family="'Inter', sans-serif" font-size="14">
                <text x="0" y="0" text-anchor="start">1.0x (Alap)</text>
                <text x="286" y="0" text-anchor="middle">2.5x</text>
                <text x="572" y="0" text-anchor="middle">5.0x</text>
                <text x="860" y="0" text-anchor="end">10.0x (Max)</text>
            </g>
        </g>
    </g>

    <!-- 5. COMPACT PILL-SHAPED TAB ROW NAVIGATION -->
    <g transform="translate(60, 1740)">
        <rect width="960" height="90" rx="45" fill="#14111E" stroke="#D0BCFF" stroke-opacity="0.1" stroke-width="2" />

        <!-- Tab 0 (Selected: Nagyítás) -->
        <g transform="translate(10, 10)">
            <rect width="220" height="70" rx="35" fill="url(#tab_selected_grad)" stroke="#D0BCFF" stroke-opacity="0.3" stroke-width="1.5" />
            <!-- Zoom Icon -->
            <path d="M90,35 A 8,8 0 1,1 106,35 A 8,8 0 1,1 90,35 M102,41 L112,51" fill="none" stroke="#D0BCFF" stroke-width="3" stroke-linecap="round" />
            <text x="125" y="42" class="label-selected">NAGYÍTÁS</text>
        </g>

        <!-- Tab 1 (Unselected: Szűrők) -->
        <g transform="translate(250, 10)">
            <!-- Filter Icon -->
            <circle cx="85" cy="35" r="10" fill="none" stroke="#938F99" stroke-width="2.5" />
            <circle cx="95" cy="42" r="10" fill="none" stroke="#938F99" stroke-width="2.5" />
            <circle cx="75" cy="42" r="10" fill="none" stroke="#938F99" stroke-width="2.5" />
            <text x="115" y="42" class="label-unselected">SZŰRŐK</text>
        </g>

        <!-- Tab 2 (Unselected: Korrekció) -->
        <g transform="translate(490, 10)">
            <!-- Tune Icon -->
            <path d="M75,25 L75,45 M70,30 L80,30 M95,25 L95,45 M90,40 L100,40 M85,35 L105,35" fill="none" stroke="#938F99" stroke-width="2.5" stroke-linecap="round" />
            <text x="115" y="42" class="label-unselected">KORREKCIÓ</text>
        </g>

        <!-- Tab 3 (Unselected: Téma) -->
        <g transform="translate(730, 10)">
            <!-- Theme Icon -->
            <path d="M80,45 C75,45 70,40 70,35 C70,25 90,20 90,20 C90,20 100,30 100,35 C100,40 95,45 90,45 Z" fill="none" stroke="#938F99" stroke-width="2.5" />
            <text x="115" y="42" class="label-unselected">TÉMA</text>
        </g>
    </g>
</svg>
