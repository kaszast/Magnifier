<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg_grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0F0926" />
            <stop offset="100%" stop-color="#1B1A21" />
        </linearGradient>
        
        <linearGradient id="primary_grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D0BCFF" />
            <stop offset="100%" stop-color="#EFB8C8" />
        </linearGradient>

        <linearGradient id="tab_selected_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2D2146" />
            <stop offset="100%" stop-color="#1F1332" />
        </linearGradient>

        <!-- Inverted lens gradient (yellow text on black lens) -->
        <linearGradient id="inverted_lens_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#05030A" />
            <stop offset="100%" stop-color="#0B0912" />
        </linearGradient>

        <!-- Fonts -->
        <style>
            .app-title { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 800; font-size: 38px; fill: #FFFFFF; letter-spacing: 2px; }
            .heading { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 26px; fill: #FFFFFF; }
            .body-text { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; font-size: 20px; fill: #E6E1E5; }
            .caption { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 400; font-size: 16px; fill: #938F99; }
            .button-text { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #FFFFFF; }
            .label-selected { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 14px; fill: #D0BCFF; letter-spacing: 1px; }
            .label-unselected { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; font-size: 14px; fill: #938F99; letter-spacing: 1px; }
            .hud-badge { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #FFEB3B; }
            .filter-btn-title { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 16px; fill: #938F99; }
            .filter-btn-title-selected { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; }
        </style>
    </defs>

    <!-- Background Frame -->
    <rect width="1080" height="1920" fill="url(#bg_grad)" />

    <!-- Outer Phone Mockup Bezel (Premium dark outline) -->
    <rect x="20" y="20" width="1040" height="1880" rx="60" fill="none" stroke="#25212E" stroke-width="12" />
    <!-- Screen Notch/Camera Cutout -->
    <rect x="420" y="45" width="240" height="40" rx="20" fill="#25212E" />

    <!-- 1. HEADER BAR -->
    <g transform="translate(60, 110)">
        <text x="0" y="40" class="app-title">NAGYÍTÓ <tspan fill="#D0BCFF">PRO</tspan></text>
        <text x="0" y="80" class="caption">2. KÉPERNYŐKÉP: Akadálymentesítő szűrők (Negatív mód)</text>
        
        <!-- Status Bar Mockup -->
        <g transform="translate(800, 20)" fill="#FFFFFF" fill-opacity="0.7">
            <!-- Signal -->
            <rect x="0" y="8" width="5" height="12" rx="1" />
            <rect x="8" y="4" width="5" height="16" rx="1" />
            <rect x="16" y="0" width="5" height="20" rx="1" />
            <!-- Wifi -->
            <path d="M 32,5 A 12,12 0 0,1 52,5 M 36,9 A 7,7 0 0,1 48,9 M 40,14 A 2,2 0 0,1 44,14" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.5" />
            <!-- Battery -->
            <rect x="64" y="2" width="30" height="16" rx="3" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2" />
            <rect x="67" y="5" width="20" height="10" rx="1" />
            <rect x="95" y="7" width="3" height="6" rx="1" />
        </g>
    </g>

    <!-- 2. MAIN VIEWFINDER (Inverted/Negative Filter Active) -->
    <g transform="translate(60, 240)">
        <!-- Viewfinder Background (Negative Mode: Dark violet/black base) -->
        <rect width="960" height="1050" rx="40" fill="#05030A" stroke="#FFEB3B" stroke-opacity="0.4" stroke-width="3" />
        <clipPath id="viewfinder_clip">
            <rect width="960" height="1050" rx="40" />
        </clipPath>

        <g clip-path="url(#viewfinder_clip)">
            <!-- Grid Lines of the document in background -->
            <path d="M0,150 L960,150 M0,300 L960,300 M0,450 L960,450 M0,600 L960,600 M0,750 L960,750 M0,900 L960,900" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1.5" />

            <!-- Original unzoomed background text (blurred, inverted yellow on black) -->
            <g opacity="0.25">
                <text x="50" y="100" font-family="'Inter', sans-serif" font-size="16" fill="#FFEB3B">ACTIVE SUBSTANCE: Each film-coated tablet contains 500 mg of paracetamol.</text>
                <text x="50" y="140" font-family="'Inter', sans-serif" font-size="16" fill="#FFEB3B">INDICATIONS: For the temporary relief of mild to moderate pain including headache.</text>
                <text x="50" y="180" font-family="'Inter', sans-serif" font-size="16" fill="#FFEB3B">DOSAGE: Adults and children over 12 years: 1-2 tablets every 4 to 6 hours as required.</text>
            </g>

            <!-- MAGNIFIED LENS AREA (High contrast negative inverted text) -->
            <circle cx="480" cy="525" r="380" fill="url(#inverted_lens_grad)" stroke="#FFEB3B" stroke-width="6" />
            <circle cx="480" cy="525" r="378" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" />

            <g transform="translate(480, 525) scale(2.8)" fill="#FFEB3B">
                <!-- High contrast inverted yellow text -->
                <text x="0" y="-40" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#FFFFFF" text-anchor="middle">FONTOS FIGYELMEZTETÉS</text>
                <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="800" font-size="15" fill="#FFEB3B" text-anchor="middle">Invertált olvasássegítő aktív</text>
                <text x="0" y="30" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#FFFFFF" text-anchor="middle">Nagy kontraszt a gyengénlátóknak</text>
                <text x="0" y="55" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#00FFCC" text-anchor="middle">Sötétben is kíméli a szemet.</text>
            </g>

            <!-- Zoom factor HUD badge in view -->
            <rect x="40" y="40" width="220" height="50" rx="25" fill="#000000" fill-opacity="0.9" stroke="#FFEB3B" stroke-width="2.5" />
            <text x="150" y="72" class="hud-badge" text-anchor="middle">INVERTÁLT SZŰRŐ</text>
        </g>
    </g>

    <!-- 3. CAMERA QUICK ACTIONS OVERLAY -->
    <g transform="translate(60, 1315)">
        <!-- Flashlight (Off) -->
        <g transform="translate(140, 0)">
            <circle cx="40" cy="40" r="40" fill="#25212E" stroke="#D0BCFF" stroke-opacity="0.2" stroke-width="2" />
            <path d="M40,20 L27,43 L38,43 L35,60 L51,35 L40,35 Z" fill="#938F99" />
        </g>

        <!-- Freeze Frame Button -->
        <g transform="translate(390, -15)">
            <circle cx="55" cy="55" r="55" fill="url(#primary_grad)" />
            <rect x="42" y="35" width="10" height="40" rx="3" fill="#1B1A21" />
            <rect x="58" y="35" width="10" height="40" rx="3" fill="#1B1A21" />
        </g>

        <!-- Save Button -->
        <g transform="translate(660, 0)">
            <circle cx="40" cy="40" r="40" fill="#25212E" stroke="#D0BCFF" stroke-opacity="0.2" stroke-width="2" />
            <path d="M40,25 L40,48 M32,40 L40,48 L48,40 M28,55 L52,55" fill="none" stroke="#D0BCFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>

    <!-- 4. CONTROLS CONTAINER (Filters selection) -->
    <g transform="translate(60, 1450)">
        <rect width="960" height="250" rx="32" fill="#14111E" stroke="#D0BCFF" stroke-opacity="0.15" stroke-width="2" />

        <text x="50" y="55" class="heading" font-size="22">Válassz olvasássegítő szűrőt:</text>

        <!-- Filter item list buttons -->
        <g transform="translate(50, 90)">
            <!-- Filter 1: Normál -->
            <g transform="translate(0, 0)">
                <rect width="160" height="90" rx="16" fill="#1B1A21" stroke="#938F99" stroke-opacity="0.2" stroke-width="1.5" />
                <circle cx="80" cy="35" r="16" fill="#D0BCFF" />
                <text x="80" y="72" class="filter-btn-title" text-anchor="middle">Normál</text>
            </g>
            
            <!-- Filter 2: Invertált (Selected) -->
            <g transform="translate(175, 0)">
                <rect width="160" height="90" rx="16" fill="#2D2146" stroke="#D0BCFF" stroke-width="2" />
                <!-- Inverted mini icon representation -->
                <circle cx="80" cy="35" r="16" fill="#000000" stroke="#FFEB3B" stroke-width="1.5" />
                <path d="M80,19 A16,16 0 0,1 80,51 Z" fill="#FFEB3B" />
                <text x="80" y="72" class="filter-btn-title-selected" text-anchor="middle">Invertált</text>
            </g>

            <!-- Filter 3: Monokróm -->
            <g transform="translate(350, 0)">
                <rect width="160" height="90" rx="16" fill="#1B1A21" stroke="#938F99" stroke-opacity="0.2" stroke-width="1.5" />
                <circle cx="80" cy="35" r="16" fill="#808080" />
                <text x="80" y="72" class="filter-btn-title" text-anchor="middle">Szürke</text>
            </g>

            <!-- Filter 4: Sárga szűrő -->
            <g transform="translate(525, 0)">
                <rect width="160" height="90" rx="16" fill="#1B1A21" stroke="#938F99" stroke-opacity="0.2" stroke-width="1.5" />
                <circle cx="80" cy="35" r="16" fill="#FFEB3B" />
                <text x="80" y="72" class="filter-btn-title" text-anchor="middle">Sárga</text>
            </g>

            <!-- Filter 5: Vörös szűrő -->
            <g transform="translate(700, 0)">
                <rect width="160" height="90" rx="16" fill="#1B1A21" stroke="#938F99" stroke-opacity="0.2" stroke-width="1.5" />
                <circle cx="80" cy="35" r="16" fill="#FF5252" />
                <text x="80" y="72" class="filter-btn-title" text-anchor="middle">Vörös</text>
            </g>
        </g>
    </g>

    <!-- 5. COMPACT PILL-SHAPED TAB ROW NAVIGATION -->
    <g transform="translate(60, 1740)">
        <rect width="960" height="90" rx="45" fill="#14111E" stroke="#D0BCFF" stroke-opacity="0.1" stroke-width="2" />

        <!-- Tab 0 (Unselected: Nagyítás) -->
        <g transform="translate(10, 10)">
            <path d="M90,35 A 8,8 0 1,1 106,35 A 8,8 0 1,1 90,35 M102,41 L112,51" fill="none" stroke="#938F99" stroke-width="2.5" stroke-linecap="round" />
            <text x="125" y="42" class="label-unselected">NAGYÍTÁS</text>
        </g>

        <!-- Tab 1 (Selected: Szűrők) -->
        <g transform="translate(250, 10)">
            <rect width="220" height="70" rx="35" fill="url(#tab_selected_grad)" stroke="#D0BCFF" stroke-opacity="0.3" stroke-width="1.5" />
            <!-- Filter Icon -->
            <circle cx="85" cy="35" r="10" fill="none" stroke="#D0BCFF" stroke-width="3" />
            <circle cx="95" cy="42" r="10" fill="none" stroke="#D0BCFF" stroke-width="3" />
            <circle cx="75" cy="42" r="10" fill="none" stroke="#D0BCFF" stroke-width="3" />
            <text x="115" y="42" class="label-selected">SZŰRŐK</text>
        </g>

        <!-- Tab 2 (Unselected: Korrekció) -->
        <g transform="translate(490, 10)">
            <path d="M75,25 L75,45 M70,30 L80,30 M95,25 L95,45 M90,40 L100,40 M85,35 L105,35" fill="none" stroke="#938F99" stroke-width="2.5" stroke-linecap="round" />
            <text x="115" y="42" class="label-unselected">KORREKCIÓ</text>
        </g>

        <!-- Tab 3 (Unselected: Téma) -->
        <g transform="translate(730, 10)">
            <path d="M80,45 C75,45 70,40 70,35 C70,25 90,20 90,20 C90,20 100,30 100,35 C100,40 95,45 90,45 Z" fill="none" stroke="#938F99" stroke-width="2.5" />
            <text x="115" y="42" class="label-unselected">TÉMA</text>
        </g>
    </g>
</svg>
